<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- 外六边形 -->
  <polygon points="50,5 90,27.5 90,72.5 50,95 10,72.5 10,27.5"
    fill="none" stroke="#3FB27F" stroke-width="4"/>
  <!-- 内六边形 -->
  <polygon points="50,18 77,33 77,67 50,82 23,67 23,33"
    fill="#3FB27F" opacity="0.15"/>
  <!-- 中心圆 -->
  <circle cx="50" cy="50" r="14" fill="#3FB27F" opacity="0.9"/>
  <!-- VR眼镜形状 -->
  <rect x="28" y="44" width="18" height="12" rx="4" fill="none" stroke="#3FB27F" stroke-width="2.5"/>
  <rect x="54" y="44" width="18" height="12" rx="4" fill="none" stroke="#3FB27F" stroke-width="2.5"/>
  <line x1="46" y1="50" x2="54" y2="50" stroke="#3FB27F" stroke-width="2.5"/>
  <!-- 三条放射线 -->
  <line x1="50" y1="18" x2="50" y2="28" stroke="#3FB27F" stroke-width="2" stroke-linecap="round"/>
  <line x1="23" y1="33" x2="31" y2="38" stroke="#3FB27F" stroke-width="2" stroke-linecap="round"/>
  <line x1="77" y1="33" x2="69" y2="38" stroke="#3FB27F" stroke-width="2" stroke-linecap="round"/>
</svg>
